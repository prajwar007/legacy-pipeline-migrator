name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest
      - name: DAG import check
        run: python -m py_compile dags/transaction_pipeline_dag.py
      - name: Simulated deploy
        run: echo "deploy would run here after lint, tests, and DAG import check"

